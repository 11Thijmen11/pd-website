<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brownGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B4423;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A2511;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="creamGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F5E6D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8D4B8;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Outer brown ring with 3D effect -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#brownGradient)" stroke-width="10"/>
  
  <!-- Inner cream circle with shadow effect -->
  <circle cx="100" cy="100" r="85" fill="url(#creamGradient)"/>
  
  <!-- Subtle inner shadow ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(75, 37, 17, 0.15)" stroke-width="4"/>
  
  <!-- E2I Text -->
  <text x="100" y="95" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#4A2511" text-anchor="middle" dominant-baseline="middle">
    E
  </text>
  
  <text x="100" y="120" font-family="Georgia, serif" font-size="35" font-weight="bold" fill="#6B4423" text-anchor="middle" dominant-baseline="middle">
    2
  </text>
  
  <text x="100" y="145" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#4A2511" text-anchor="middle" dominant-baseline="middle">
    I
  </text>
  
  <!-- Subtle shine effect -->
  <ellipse cx="100" cy="60" rx="50" ry="20" fill="white" opacity="0.15"/>
</svg>

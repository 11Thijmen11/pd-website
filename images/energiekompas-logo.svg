<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8A55C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E67E45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A83F2B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#orangeGradient)" stroke-width="8" opacity="0.8"/>
  
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#orangeGradient)" stroke-width="6" opacity="0.6"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#orangeGradient)" stroke-width="4" opacity="0.4"/>
  
  <!-- Compass needle -->
  <g transform="translate(100, 100) rotate(-45)">
    <path d="M 0,-40 L -15,40 L 0,0 L 15,40 Z" fill="url(#orangeGradient)"/>
    <circle cx="0" cy="0" r="12" fill="white"/>
  </g>
  
  <!-- Cardinal points -->
  <rect x="97" y="15" width="6" height="15" fill="url(#orangeGradient)" rx="2"/>
  <rect x="97" y="170" width="6" height="15" fill="url(#orangeGradient)" rx="2"/>
  <rect x="15" y="97" width="15" height="6" fill="url(#orangeGradient)" rx="2"/>
  <rect x="170" y="97" width="15" height="6" fill="url(#orangeGradient)" rx="2"/>
</svg>
